name: Backtest Diagnose (BTC) - From Fetch Run Artifact

on:
  workflow_dispatch:
    inputs:
      fetch_run_id:
        description: "Run ID of the successful Fetch Full History workflow (number)"
        required: true
      cache_artifact_name:
        description: "Artifact name (e.g. cache_BTCUSDT_15m)"
        required: true
        default: "cache_BTCUSDT_15m"
      start:
        description: "Start ISO UTC"
        required: true
        default: "2025-01-01T00:00:00Z"
      end:
        description: "End ISO UTC"
        required: true
        default: "2026-01-01T00:00:00Z"
      out:
        description: "Output directory"
        required: true
        default: "data/outputs/diagnose"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download cache artifact from fetch run
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.fetch_run_id }}
          name: ${{ inputs.cache_artifact_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .

      - name: Debug cache presence
        run: |
          ls -la data || true
          ls -la data/cache || true

      - name: Run diagnose
        run: |
          python -m runner.backtest_diagnose --start "${{ inputs.start }}" --end "${{ inputs.end }}" --out "${{ inputs.out }}"

      - name: Upload diagnose artifact
        uses: actions/upload-artifact@v4
        with:
          name: diagnose_artifacts
          path: |
            ${{ inputs.out }}/diagnose.json
