name: Backtest Diagnose (BTC) - From Cache Artifact

on:
  workflow_dispatch:
    inputs:
      cache_artifact:
        description: "Artifact name produced by fetch_full_history (e.g. cache_BTCUSDT_15m)"
        required: true
        default: "cache_BTCUSDT_15m"
      start:
        description: "Start ISO UTC"
        required: true
        default: "2025-01-01T00:00:00Z"
      end:
        description: "End ISO UTC"
        required: true
        default: "2026-01-01T00:00:00Z"
      out:
        description: "Output directory"
        required: true
        default: "data/outputs/diagnose"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download cache artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.cache_artifact }}
          path: .

      - name: Run diagnose (uses cache file in data/cache/)
        run: |
          python -m runner.backtest_diagnose --start "${{ inputs.start }}" --end "${{ inputs.end }}" --out "${{ inputs.out }}"

      - name: Upload diagnose artifact
        uses: actions/upload-artifact@v4
        with:
          name: diagnose_artifacts
          path: |
            ${{ inputs.out }}/diagnose.json
