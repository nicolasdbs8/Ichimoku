name: Fetch Full History (Cache)

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Symbol (e.g. BTC/USDT)"
        required: true
        default: "BTC/USDT"
      timeframe:
        description: "Timeframe (e.g. 15m)"
        required: true
        default: "15m"
      start:
        description: "Start ISO UTC (e.g. 2025-01-01T00:00:00Z)"
        required: true
        default: "2025-01-01T00:00:00Z"
      end:
        description: "End ISO UTC (optional, empty = fetch to latest)"
        required: false
        default: "2026-01-01T00:00:00Z"
      limit:
        description: "ccxt limit per call"
        required: true
        default: "1000"

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch history into cache
        run: |
          CMD="python -m runner.fetch_history --symbol '${{ inputs.symbol }}' --timeframe '${{ inputs.timeframe }}' --start '${{ inputs.start }}' --limit ${{ inputs.limit }}"
          if [ -n "${{ inputs.end }}" ]; then CMD="$CMD --end '${{ inputs.end }}'"; fi
          echo "$CMD"
          eval $CMD

      - name: Sanitize symbol for artifact name
        id: sanitize
        shell: bash
        run: |
          SYM="${{ inputs.symbol }}"
          # remove characters that break artifact names
          SYM_CLEAN="${SYM//\//}"
          SYM_CLEAN="${SYM_CLEAN//:/}"
          echo "symbol_clean=$SYM_CLEAN" >> "$GITHUB_OUTPUT"

      - name: Upload cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: cache_${{ steps.sanitize.outputs.symbol_clean }}_${{ inputs.timeframe }}
          path: data/cache/
