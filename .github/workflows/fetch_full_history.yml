name: Fetch Full History (Cache) - Binance Public Data

on:
  workflow_dispatch:
    inputs:
      market:
        description: "Binance public data market: spot or futures_um"
        required: true
        default: "spot"
      symbol:
        description: "Symbol (e.g. BTC/USDT)"
        required: true
        default: "BTC/USDT"
      timeframe:
        description: "Timeframe (e.g. 15m)"
        required: true
        default: "15m"
      start:
        description: "Start ISO UTC (e.g. 2025-01-01T00:00:00Z)"
        required: true
        default: "2025-01-01T00:00:00Z"
      end:
        description: "End ISO UTC (e.g. 2026-01-01T00:00:00Z)"
        required: true
        default: "2026-01-01T00:00:00Z"

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build cache CSV from Binance public data
        run: |
          # Cache naming must match your existing cache_path convention: BTC_USDT__15m.csv
          SYM="${{ inputs.symbol }}"
          SYM_FILE="${SYM//\//_}"
          OUT="data/cache/${SYM_FILE}__${{ inputs.timeframe }}.csv"
          python -m runner.fetch_history_binance_vision \
            --market "${{ inputs.market }}" \
            --symbol "${{ inputs.symbol }}" \
            --timeframe "${{ inputs.timeframe }}" \
            --start "${{ inputs.start }}" \
            --end "${{ inputs.end }}" \
            --out_csv "$OUT"

      - name: Sanitize symbol for artifact name
        id: sanitize
        shell: bash
        run: |
          SYM="${{ inputs.symbol }}"
          SYM_CLEAN="${SYM//\//}"
          SYM_CLEAN="${SYM_CLEAN//:/}"
          echo "symbol_clean=$SYM_CLEAN" >> "$GITHUB_OUTPUT"

      - name: Upload cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: cache_${{ steps.sanitize.outputs.symbol_clean }}_${{ inputs.timeframe }}
          path: data/cache/
